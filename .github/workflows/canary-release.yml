name: Canary Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from (defaults to current branch)'
        required: false
        type: string

jobs:
  canary-release:
    name: Canary Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish Snapshot
        run: npx changeset version --snapshot canary && npm publish --tag canary
